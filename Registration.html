<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
            body {
                background-color: #dceafa;
            }
            div.container, body {

            ol, table {
                display: inline-block;
                text-align: left;

    </style>

<body>
    
    <header>
        <h1 id="Home"><strong>Tessera</strong></h1>
        
        <p>Registration Page</p>
    </header>
    
    <br><br>

    <form action="file:///C:/Users/UPHSD/Documents/Libetario/Libetario_System_Midterms_pt_2/Landing%20Page.html">
        <label for="name">Full Name:</label>
        <input type="text" id="name" name="name" required>
        <br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>
        <br>
        
        <label for="subject">Password:</label>
        <input type="text" id="subject" name="subject" required>
        <br>

        <p> Gender: <br>
            <label for="male">Male</label>
            <input type="radio" id="male" name="gender" value="Male" required><br>
            <label for="female">Female</label>
            <input type="radio" id="female" name="gender" value="Female" required><br>
            <label for="prefernot">Prefere not to say</label>
            <input type="radio" id="prefernot" name="gender" value="Prefer not to say" required><br>
        </p>
        <br>

        <p> Interests: <br>
            <label for="interests_sports">Sports</label>
            <input type="checkbox" id="interests_sports" name="interests_sports" value="Sports"><br>
            <label for="interests_education">Education</label>
            <input type="checkbox" id="interests_education" name="interests_education" value="Education"><br>
            <label for="interests_music">Music</label>
            <input type="checkbox" id="interests_music" name="interests_music" value="Music"><br>
        </p>
        <br>

        <input type="submit" value="Register">
    </form>


    <br><br>
