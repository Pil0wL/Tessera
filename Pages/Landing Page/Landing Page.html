<!DOCTYPE html>
<html lang="en">
<head>
    <title>Tessera - Home Page</title>
    <head>
        <title>Tessera</title>
        <meta property="og:title" content="Tessera" />
        <meta property="twitter:card" content="summary_large_image" />

        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta charset="UTF-8" />
        <link rel="stylesheet" href="../../globalstyles.css"/>
    </head>
</head>
    <body>
        <link rel="stylesheet" href="./style.css"/>
        <link rel="stylesheet" href="./style_myactivity.css"/>


        <div class="container-fit-to-screen color-bg">
            

            <!-- Quick Access -->
            <div class="homepage-container-quick-access default-shadow">
                <!-- logo -->
                <div class="container-logo homepage-container-logo textstyle-standard">
                    <img src="../../images/Freepik ticket.png" alt="Freepik Logo">
                    <p>Tessera</p>
                </div>

                <!-- buttons -->
                <button onclick="openPopup('my_activity')" class="textstyle-standard button-style1 default-shadow homepage-quickacess-button" >My Activity</button>
            
                <button onclick="openPopup('submit_ticket')" class="textstyle-standard button-style1 default-shadow homepage-quickacess-button" style="top: 230px;">Submit a Ticket</button>
            
                <button onclick="openPopup('messages')" class="textstyle-standard button-style1 default-shadow homepage-quickacess-button" style="top: 295px;">Messages</button>
                
                <button onclick="openPopup('my_account')" class="textstyle-standard button-style1 default-shadow homepage-quickacess-button" style="top: auto; bottom: 50px;">My Account</button>

            
            </div>

            <!-- Panels -->
            <div class="homepage-container-panels">
                
                <!-- My Activity -->
                <div id="my_activity" class="homepage-individual-panel">
                    <div id="my_activity_1" class="homepage-myactivity-container">
                        <input type="text" class="textstyle-standard button-style1 default-shadow homepage-myactivity-1-search" placeholder="Search...">
                    
                        <div class="textstyle-standard button-style1 default-shadow homepage-myactivity-1-1">
                            Ticket History
                        </div>
                        <div class="textstyle-standard container-mainfill homepage-myactivity-1-2">
                            Details
                        </div>
                        <div class="textstyle-standard container-mainfill homepage-myactivity-1-3">
                            Actions
                        </div>
                    </div>
                    <div id="my_activity_2" class="homepage-myactivity-container">
                        <input type="text" class="textstyle-standard button-style1 default-shadow homepage-myactivity-1-search" placeholder="Search...">
                    
                        <div class="textstyle-standard button-style1 default-shadow homepage-myactivity-2-1">
                            Ticket History
                        </div>
                        <div class="textstyle-standard container-mainfill homepage-myactivity-2-2">
                            Details
                        </div>
                    </div>
                    <div id="my_activity_3" class="homepage-myactivity-container">
                        
                        <div class="textstyle-standard container-mainfill homepage-myactivity-3-1">
                            Graph here
                        </div>
                        <div class="textstyle-standard button-style1 default-shadow homepage-myactivity-3-export">
                            Export as PDF
                        </div>
                        <div class="textstyle-standard button-style1 default-shadow homepage-myactivity-3-export" style="right: 225px">
                            Export as CSV
                        </div>
                    </div>

                    <!-- Buttons -->
                    <div onclick="myactivityOpenPage('my_activity_1')" class="textstyle-standard button-style1 default-shadow homepage-myactivity-button">
                        1
                    </div>
                    <div onclick="myactivityOpenPage('my_activity_2')" class="textstyle-standard button-style1 default-shadow homepage-myactivity-button" style="left: 80px;">
                        2
                    </div>
                    <div onclick="myactivityOpenPage('my_activity_3')" class="textstyle-standard button-style1 default-shadow homepage-myactivity-button" style="left: 135px;">
                        3
                    </div>
                </div>

                <!-- Submit a Ticket -->
                <div id="submit_ticket" class="homepage-individual-panel">
                    submit ticket
                </div>

                <!-- Messages -->
                <div id="messages" class="homepage-individual-panel">
                    
                    <div class="textstyle-standard button-style1 homepage-messages-1 default-shadow">
                        mmessaags
                    </div>
                    <div class="textstyle-standard container-mainfill homepage-messages-2">
                        mmessaags
                    </div>
                </div>
                <div id="my_account" class="homepage-individual-panel">
                    mu account
                </div>
            </div>

        </div>
        <link rel="canonical" href="https://pil0wl.github.io/Tessera/">

    </body>
    <script src="../../globalscript.js"></script>
    <script src="./script.js"></script>
</html>
