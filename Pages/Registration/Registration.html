<!DOCTYPE html>
<html lang="english">

    <head>
        <title>Tessera - Registration</title>
        <meta property="og:title" content="Tessera" />
        <meta property="twitter:card" content="summary_large_image" />

        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta charset="utf-8" />
        <link rel="stylesheet" href="../../globalstyles.css"/>
    </head>
    <body>

        
        <link rel="stylesheet" href="./style.css"/>
        <div class="container-fit-to-screen color-bg">
            


            <!-- background -->
            <div class="registration-mask bg-image">
                <img src="../../images/Registration.jpg" alt="its just clouds">
            </div>

            <!-- Title -->
            <div class="textstyle-standard registration-title">
                Register
            </div>

            <!-- the registration details -->
            <div class="container-borderfill registration-container default-shadow">
                <form class="my-form" action="../Landing Page/Landing Page.html">
                    <input class="textstyle-standard button-style1 registration-username default-shadow" type="text" name="username" placeholder="Enter name" />
                    <input class="textstyle-standard button-style1 registration-password default-shadow" type="password" name="password" placeholder="Enter Password" />
                    <input class="textstyle-standard button-style1 registration-password registration-re-password default-shadow" type="password" name="password" placeholder="Re-Enter Password" />

                    <button class="textstyle-standard button-style1 registration-submit default-shadow" type="submit">Register</button>
                </form>
            </div>

        </div>
        <link rel="canonical" href="https://pil0wl.github.io/Tessera/">


    </body>
    <script src="../../globalscript.js"></script>
</html>
