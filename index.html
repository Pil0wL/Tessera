<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tessera</title>
    <style>
            body {
                background-color: #dceafa;
            }
            div.container, body {
                text-align: center;
            }
            ol, table {
                display: inline-block;
                text-align: left;
            }
    </style>
</head>
<body>
    
    <header>
        <h1 id="Home">Welcome to <strong>Tessera</strong>, a Customer Ticketing Support System</h1>
        <blockquote>
            "A service so light, it delivers without delay"
        </blockquote>
        
        <p>A lightweight program to be used in conjunction for another.</p>
    </header>

    
    <form action="Landing Page.html">
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>
        <br>
        
        <label for="subject">Password:</label>
        <input type="text" id="subject" name="subject" required>
        <br>
        
        <input type="submit" value="Login">
    </form>


    <p>New to Tessera? 
    <a href="Registration.html">
        Register
    </a>
    </p>
    
    <br><br>
    


</body>
</html>
